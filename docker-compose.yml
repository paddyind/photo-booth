services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: photo-booth-backend:latest
    pull_policy: never
    container_name: backend
    command: uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000
    environment:
      # Explicit paths inside container; host persistence is via volumes below.
      - DATA_DIR=/app/data
      - FRAMES_DIR=/app/shared/frames
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./data:/app/data
      - ./shared/frames:/app/shared/frames

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: photo-booth-web:latest
    pull_policy: never
    container_name: web
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./apps/web/src:/usr/share/nginx/html:ro
    environment:
      - VITE_API_BASE=http://localhost:${API_PORT:-8000}
    depends_on:
      - backend
