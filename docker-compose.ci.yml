services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - FRAMES_DIR=/app/shared/frames
    ports:
      - "${API_PORT:-3201}:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./data:/app/data
      - ./shared/frames:/app/shared/frames

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3200}:80"
    volumes:
      - ./apps/web/src:/usr/share/nginx/html:ro
    environment:
      - VITE_API_BASE=http://localhost:${API_PORT:-3201}
    depends_on:
      - backend

