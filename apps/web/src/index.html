<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Booth</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23111'/%3E%3Ccircle cx='8' cy='8' r='4' fill='%2300f3ff'/%3E%3C/svg%3E" />
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #111; color: #fff; }
      .wrap { max-width: 720px; margin: 0 auto; }
      video { width: 100%; border-radius: 12px; background: #000; }
      button, select { padding: 10px 14px; border-radius: 8px; border: 0; margin-top: 10px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .card { background: #1d1d1d; border-radius: 12px; padding: 12px; margin-top: 12px; }
      .muted { color: #bbb; font-size: 14px; }
      .status { margin-top: 8px; font-size: 14px; color: #9ad; }
      .status.error { color: #ff8f8f; }
      a { color: #7ad0ff; }
      .pill { background: #2a2a2a; border-radius: 999px; padding: 6px 10px; font-size: 13px; color: #ddd; }
      .primary { background: #00c2ff; color: #031018; font-weight: 700; }
      .secondary { background: #2f2f2f; color: #fff; }
      .actions button { min-width: 150px; }
      .preview-pane { min-height: 120px; display: flex; flex-direction: column; gap: 8px; }
      .preview-shell {
        width: 100%;
        aspect-ratio: var(--preview-ratio, 2 / 3);
        background: #0f0f0f;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #333;
      }
      .preview-shell img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background: #161616;
      }
      .frame-grid {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .frame-card {
        border: 1px solid #333;
        border-radius: 12px;
        background: #171717;
        padding: 8px;
        cursor: pointer;
        user-select: none;
      }
      .frame-card.selected {
        border-color: #00c2ff;
        box-shadow: 0 0 0 2px rgba(0, 194, 255, 0.18);
      }
      .frame-thumb {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #0f0f0f;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .frame-thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background: #0f0f0f;
      }
      .frame-name {
        margin-top: 8px;
        font-size: 12px;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .rear-preview-toolbar {
        display: none;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #171717;
        border: 1px solid #333;
      }
      .rear-preview-toolbar.visible {
        display: flex;
      }
      .rear-print-countdown {
        font-size: 15px;
        font-weight: 700;
        color: #7ad0ff;
        flex: 1;
        min-width: 140px;
        text-align: right;
      }
      .rear-print-countdown.idle {
        font-weight: 500;
        color: #9ad;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Photo Booth</h1>
      <p class="muted" id="appTagline">Start the camera, capture, pick a frame, then print. Rear camera uses auto-print after a short countdown — use <strong>Capture again</strong> above the preview to retake.</p>

      <div class="card">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="row">
          <span class="pill">Camera</span>
          <select id="cameraModeSelect">
            <option value="front">Front (interactive)</option>
            <option value="rear">Rear (fixed 4x6)</option>
          </select>
          <span class="pill">Name</span>
          <input id="nameInput" type="text" placeholder="Enter name (optional)" style="padding:10px 14px;border-radius:8px;border:0;min-width:180px;" />
          <span class="pill">Size</span>
          <select id="sizeSelect"></select>
          <span class="pill">Orientation</span>
          <select id="orientationSelect"></select>
          <button id="startCameraBtn" class="secondary">Start Camera</button>
          <button id="stopCameraBtn" class="secondary">Stop Camera</button>
          <button id="captureBtn" class="primary">Capture + Preview</button>
        </div>
        <div id="frameGrid" class="frame-grid" style="display:none;"></div>
        <div class="row actions">
          <button id="prepareFinalBtn" class="secondary" style="display:none;">Prepare Final</button>
          <select id="finalFormat" style="display:none;">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="pdf">PDF</option>
          </select>
          <button id="printBtn" class="secondary" style="display:none;">Print Final</button>
          <button id="cleanupBtn" class="secondary" type="button" hidden>Clean saved files</button>
        </div>
        <div id="status" class="status">Loading…</div>
        <details id="debugPanel" class="muted" style="margin-top:8px;" hidden>
          <summary>Debug logs</summary>
          <pre id="debugLog" style="white-space:pre-wrap;max-height:160px;overflow:auto;"></pre>
        </details>
      </div>

      <div class="card" id="previewCard" style="display:none;">
        <h3>Composed Preview</h3>
        <div id="rearPreviewToolbar" class="rear-preview-toolbar" aria-live="polite">
          <button id="rearCaptureAgainBtn" type="button" class="secondary" aria-label="Capture again and replace preview">
            Capture again
          </button>
          <span id="rearPrintCountdown" class="rear-print-countdown idle"></span>
        </div>
        <div id="previewShell" class="preview-shell">
          <img id="preview" alt="Preview will appear here" />
        </div>
        <div class="preview-pane">
          <p id="finalLinkWrap" class="muted"></p>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = window.PHOTOBOOTH_API_BASE || `${location.protocol}//${location.hostname}:8000`;
      // Mobile builds can inject this to opt-in to showing 8x11.
      const ENABLE_8X11 =
        window.PHOTOBOOTH_ENABLE_8X11 === true ||
        window.PHOTOBOOTH_ENABLE_8X11 === "true" ||
        window.PHOTOBOOTH_ENABLE_8X11 === 1 ||
        window.PHOTOBOOTH_ENABLE_8X11 === "1";
      /** Rear mode: ms before opening print URL (default 10s). Inject PHOTOBOOTH_REAR_PRINT_DELAY_MS. */
      const REAR_AUTO_PRINT_DELAY_MS =
        Number(window.PHOTOBOOTH_REAR_PRINT_DELAY_MS) > 0
          ? Number(window.PHOTOBOOTH_REAR_PRINT_DELAY_MS)
          : 10000;
      /**
       * When true, rear mode does not open the browser print tab after the delay (use host print_watcher only).
       * Inject PHOTOBOOTH_SUPPRESS_REAR_BROWSER_PRINT.
       */
      const SUPPRESS_REAR_BROWSER_PRINT =
        window.PHOTOBOOTH_SUPPRESS_REAR_BROWSER_PRINT === true ||
        window.PHOTOBOOTH_SUPPRESS_REAR_BROWSER_PRINT === "true" ||
        window.PHOTOBOOTH_SUPPRESS_REAR_BROWSER_PRINT === 1 ||
        window.PHOTOBOOTH_SUPPRESS_REAR_BROWSER_PRINT === "1";
      /**
       * Verbose logging + debug panel. Enable with ?debug=1, #debug, or window.PHOTOBOOTH_DEBUG (prepare-www / console).
       */
      const DEBUG_MODE =
        window.PHOTOBOOTH_DEBUG === true ||
        window.PHOTOBOOTH_DEBUG === "true" ||
        window.PHOTOBOOTH_DEBUG === 1 ||
        window.PHOTOBOOTH_DEBUG === "1" ||
        (typeof location !== "undefined" &&
          (/(?:^|[?&#])debug=1(?:&|$)/.test(location.search) || /#debug\b/.test(location.hash)));
      /** Show “Clean saved files” (mobile storage). Hidden by default; enable with PHOTOBOOTH_SHOW_CLEANUP or debug mode. */
      const SHOW_CLEANUP =
        DEBUG_MODE ||
        window.PHOTOBOOTH_SHOW_CLEANUP === true ||
        window.PHOTOBOOTH_SHOW_CLEANUP === "true" ||
        window.PHOTOBOOTH_SHOW_CLEANUP === 1 ||
        window.PHOTOBOOTH_SHOW_CLEANUP === "1";
      // Capacitor @capacitor/filesystem Directory enum value (inject via prepare-www env PHOTOBOOTH_FS_DIRECTORY).
      const ALLOWED_FS_DIRECTORIES = new Set([
        "DOCUMENTS",
        "DATA",
        "CACHE",
        "LIBRARY",
        "EXTERNAL",
        "EXTERNAL_STORAGE",
      ]);
      const FS_DIRECTORY_RAW = (window.PHOTOBOOTH_FS_DIRECTORY || "DOCUMENTS").toString().toUpperCase();
      const FS_DIRECTORY = ALLOWED_FS_DIRECTORIES.has(FS_DIRECTORY_RAW) ? FS_DIRECTORY_RAW : "DOCUMENTS";
      /**
       * Parent path under FS_DIRECTORY (e.g. Download, Documents). Empty = only dated folder at root.
       * Injected via prepare-www: PHOTOBOOTH_SAVE_PATH (default Download for phone + Syncthing).
       */
      function normalizeRelPath(p) {
        return (p == null || p === "" ? "" : String(p))
          .trim()
          .replace(/^\/+|\/+$/g, "")
          .replace(/\\/g, "/");
      }
      const DATED_FOLDER_STORAGE_KEY = "photobooth_event_sync_folder_v2";
      /** Reused across app updates; created on first run. Format: PhotoBooth_DDMMYYYY (matches standalone API data-standalone layout). */
      function getOrCreateEventFolderName() {
        try {
          let name = localStorage.getItem(DATED_FOLDER_STORAGE_KEY);
          if (name && /^PhotoBooth_\d{8}$/.test(name)) return name;
          const d = new Date();
          const ddmmyyyy = `${String(d.getDate()).padStart(2, "0")}${String(d.getMonth() + 1).padStart(2, "0")}${d.getFullYear()}`;
          name = `PhotoBooth_${ddmmyyyy}`;
          localStorage.setItem(DATED_FOLDER_STORAGE_KEY, name);
          return name;
        } catch (_e) {
          const d = new Date();
          return `PhotoBooth_${String(d.getDate()).padStart(2, "0")}${String(d.getMonth() + 1).padStart(2, "0")}${d.getFullYear()}`;
        }
      }
      const EVENT_FOLDER_NAME = getOrCreateEventFolderName();
      let savePathParent = normalizeRelPath(window.PHOTOBOOTH_SAVE_PATH);
      if (savePathParent === "" && window.PHOTOBOOTH_SAVE_PATH == null) {
        const legO = normalizeRelPath(window.PHOTOBOOTH_SAVE_PATH_ORIGINALS);
        const legF = normalizeRelPath(window.PHOTOBOOTH_SAVE_PATH_FINALS);
        if (legO && legF && legO === legF) savePathParent = legO;
      }
      const SAVE_PATH = savePathParent
        ? `${savePathParent}/${EVENT_FOLDER_NAME}`
        : EVENT_FOLDER_NAME;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const preview = document.getElementById("preview");
      const sizeSelect = document.getElementById("sizeSelect");
      const orientationSelect = document.getElementById("orientationSelect");
      const cameraModeSelect = document.getElementById("cameraModeSelect");
      const nameInput = document.getElementById("nameInput");
      const frameGrid = document.getElementById("frameGrid");
      const startCameraBtn = document.getElementById("startCameraBtn");
      const stopCameraBtn = document.getElementById("stopCameraBtn");
      const captureBtn = document.getElementById("captureBtn");
      const finalFormat = document.getElementById("finalFormat");
      const prepareFinalBtn = document.getElementById("prepareFinalBtn");
      const printBtn = document.getElementById("printBtn");
      const cleanupBtn = document.getElementById("cleanupBtn");
      const previewCard = document.getElementById("previewCard");
      const previewShell = document.getElementById("previewShell");
      const statusEl = document.getElementById("status");
      const finalLinkWrap = document.getElementById("finalLinkWrap");
      const debugLogEl = document.getElementById("debugLog");
      const debugPanel = document.getElementById("debugPanel");

      function applyProductionChrome() {
        if (DEBUG_MODE) {
          debugPanel?.removeAttribute("hidden");
        } else {
          debugPanel?.setAttribute("hidden", "");
        }
        if (SHOW_CLEANUP) {
          cleanupBtn?.removeAttribute("hidden");
        } else {
          cleanupBtn?.setAttribute("hidden", "");
        }
      }
      const rearPreviewToolbar = document.getElementById("rearPreviewToolbar");
      const rearCaptureAgainBtn = document.getElementById("rearCaptureAgainBtn");
      const rearPrintCountdown = document.getElementById("rearPrintCountdown");

      let currentImageId = null;
      let finalizedImageId = null;
      let currentFinalUrl = "";
      let selectedFrameId = "";
      let framePreviewUrls = {}; // frameId -> full preview URL
      let activeStream = null;
      let rearFixedFrameId = "";
      let currentCaptureBlob = null;
      let currentCaptureMeta = null;
      let rearAutoPrintTimer = null;
      let rearCountdownInterval = null;
      /** Seconds remaining for auto-print, or null if not counting */
      let rearCountdownSecondsLeft = null;
      let captureWorkflowBusy = false;
      let rearPreparingFinal = false;

      function clearRearAutoPrintSchedule() {
        if (rearAutoPrintTimer) clearTimeout(rearAutoPrintTimer);
        rearAutoPrintTimer = null;
        if (rearCountdownInterval) clearInterval(rearCountdownInterval);
        rearCountdownInterval = null;
        rearCountdownSecondsLeft = null;
        syncRearPreviewToolbar();
      }

      function rearPrintDelayLabel() {
        const s = Math.max(1, Math.round(REAR_AUTO_PRINT_DELAY_MS / 1000));
        return `${s}s`;
      }

      /**
       * Rear mode: toolbar above preview — Capture again + countdown / state text.
       */
      function syncRearPreviewToolbar() {
        if (!rearPreviewToolbar || !rearPrintCountdown) return;
        const cardVisible = previewCard && previewCard.style.display !== "none";
        if (!isRearMode() || !cardVisible || !currentImageId) {
          rearPreviewToolbar.classList.remove("visible");
          return;
        }
        rearPreviewToolbar.classList.add("visible");

        if (rearPreparingFinal) {
          rearPrintCountdown.classList.add("idle");
          rearPrintCountdown.textContent = "Preparing JPEG final…";
          return;
        }

        if (rearCountdownSecondsLeft != null && rearCountdownSecondsLeft > 0) {
          rearPrintCountdown.classList.remove("idle");
          if (SUPPRESS_REAR_BROWSER_PRINT) {
            rearPrintCountdown.textContent = `Folder print in ${rearCountdownSecondsLeft} s…`;
          } else {
            rearPrintCountdown.textContent = `Printing in ${rearCountdownSecondsLeft} s…`;
          }
        } else if (rearCountdownSecondsLeft === 0) {
          rearPrintCountdown.classList.remove("idle");
          rearPrintCountdown.textContent = SUPPRESS_REAR_BROWSER_PRINT
            ? "Sending to printer…"
            : "Opening print…";
        } else {
          rearPrintCountdown.classList.add("idle");
          if (currentFinalUrl) {
            rearPrintCountdown.textContent = `Ready — Print now or wait for auto-print (${rearPrintDelayLabel()}). Capture again to retake.`;
          } else {
            rearPrintCountdown.textContent = "Tap Capture again to take another photo.";
          }
        }
      }

      /**
       * After rear-mode final is ready: countdown then open print URL (unless suppressed for watch-folder printing).
       */
      function scheduleRearAutoPrint() {
        clearRearAutoPrintSchedule();
        if (!isRearMode() || !currentFinalUrl) return;
        const totalSec = Math.max(1, Math.ceil(REAR_AUTO_PRINT_DELAY_MS / 1000));
        rearCountdownSecondsLeft = totalSec;
        syncRearPreviewToolbar();

        function updateStatusLine() {
          if (!isRearMode() || !currentFinalUrl) return;
          const left = rearCountdownSecondsLeft;
          if (left == null) return;
          if (left <= 0) {
            setStatus(
              DEBUG_MODE
                ? SUPPRESS_REAR_BROWSER_PRINT
                  ? "Rear: sending to folder printer…"
                  : "Rear: opening print…"
                : SUPPRESS_REAR_BROWSER_PRINT
                  ? "Sending to printer…"
                  : "Opening print…"
            );
            return;
          }
          if (DEBUG_MODE) {
            if (SUPPRESS_REAR_BROWSER_PRINT) {
              setStatus(
                `Rear: folder print in ${left} s (${rearPrintDelayLabel()} total). Capture again above preview to cancel.`
              );
            } else {
              setStatus(
                `Rear: printing in ${left} s (${rearPrintDelayLabel()} total). Capture again or Print now.`
              );
            }
          } else {
            setStatus(
              SUPPRESS_REAR_BROWSER_PRINT
                ? `Printer in ${left} s — Capture again to cancel`
                : `Printing in ${left} s — Capture again or Print now`
            );
          }
        }
        updateStatusLine();
        rearCountdownInterval = setInterval(() => {
          if (rearCountdownSecondsLeft == null) return;
          rearCountdownSecondsLeft -= 1;
          syncRearPreviewToolbar();
          updateStatusLine();
          if (rearCountdownSecondsLeft <= 0) {
            if (rearCountdownInterval) clearInterval(rearCountdownInterval);
            rearCountdownInterval = null;
          }
        }, 1000);
        rearAutoPrintTimer = setTimeout(() => {
          clearRearAutoPrintSchedule();
          if (!isRearMode() || !currentFinalUrl) return;
          if (!SUPPRESS_REAR_BROWSER_PRINT) {
            window.open(currentFinalUrl, "_blank", "noopener");
            setStatus(DEBUG_MODE ? "Rear: print dialog opened." : "Print opened.");
          } else {
            setStatus(
              DEBUG_MODE
                ? "Rear: final on server — print_watcher will print."
                : "Sent to printer folder."
            );
          }
          if (rearPrintCountdown && isRearMode() && previewCard.style.display !== "none" && currentImageId) {
            rearPrintCountdown.classList.add("idle");
            rearPrintCountdown.textContent = SUPPRESS_REAR_BROWSER_PRINT
              ? "Sent to folder printer — Capture again for another."
              : "Print opened — Capture again for another.";
            rearPreviewToolbar.classList.add("visible");
          }
        }, REAR_AUTO_PRINT_DELAY_MS);
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? "status error" : "status";
      }

      function logDebug(message, meta = null) {
        if (!DEBUG_MODE) return;
        const ts = new Date().toISOString();
        const detail = meta ? ` ${JSON.stringify(meta)}` : "";
        const line = `[${ts}] ${message}${detail}`;
        console.log(line);
        if (!debugLogEl) return;
        debugLogEl.textContent += `${line}\n`;
        const maxChars = 6000;
        if (debugLogEl.textContent.length > maxChars) {
          debugLogEl.textContent = debugLogEl.textContent.slice(-maxChars);
        }
      }

      async function readErrorBody(res) {
        try {
          const text = await res.text();
          return text.slice(0, 240);
        } catch (_e) {
          return "";
        }
      }

      async function apiFetch(url, options = {}, label = "request") {
        const method = options.method || "GET";
        const started = Date.now();
        logDebug(`HTTP ${label} -> ${method} ${url}`);
        try {
          const res = await fetch(url, { ...options, mode: "cors" });
          logDebug(`HTTP ${label} <- ${res.status} ${res.statusText} (${Date.now() - started}ms)`);
          return res;
        } catch (e) {
          logDebug(`HTTP ${label} failed`, {
            message: e.message,
            online: navigator.onLine,
            apiBase: API_BASE,
            page: location.href,
          });
          const hint = DEBUG_MODE
            ? `${e.message} (api=${API_BASE}, online=${navigator.onLine})`
            : "Cannot reach the photo booth server. Check Wi‑Fi and that the app is running.";
          throw new Error(hint);
        }
      }

      async function checkApiHealth() {
        try {
          const res = await apiFetch(`${API_BASE}/health`, {}, "health");
          if (!res.ok) {
            const body = await readErrorBody(res);
            logDebug("Health check returned non-OK", { status: res.status, body });
            return false;
          }
          const data = await res.json();
          logDebug("Health check OK", data);
          return true;
        } catch (e) {
          logDebug("Health check error", { message: e.message });
          return false;
        }
      }

      function setCameraButtonsState(isOn) {
        startCameraBtn.disabled = isOn;
        stopCameraBtn.disabled = !isOn;
        captureBtn.disabled = !isOn;
      }

      function isRearMode() {
        return cameraModeSelect.value === "rear";
      }

      function isMobileDevice() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || "");
      }

      function isCapacitorNative() {
        return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function" && window.Capacitor.isNativePlatform());
      }

      function getSessionTimestamp() {
        const now = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      }

      function sanitizeName(raw) {
        const val = (raw || "").trim();
        if (!val) return "NO_NAME";
        return val.replace(/[^a-zA-Z0-9_-]+/g, "_").slice(0, 60) || "NO_NAME";
      }

      /** Short base for saves: guest name + capture timestamp only (matches API image_id prefix). */
      function buildFilePrefix(meta) {
        return `${meta.baseName}_${meta.captureTs}`;
      }

      /**
       * Browser download: suggest PhotoBooth/<file> so many browsers save under Downloads/PhotoBooth/.
       * (Some browsers flatten to a single filename; files still start with recognizable names.)
       */
      function triggerDownloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const safeFolder = SAVE_PATH || "PhotoBooth";
        a.download = `${safeFolder}/${filename}`.replace(/\/+/g, "/");
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const result = String(reader.result || "");
            const base64 = result.includes(",") ? result.split(",")[1] : result;
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function ensureNativeStoragePermission() {
        if (!isCapacitorNative()) return;
        const fsPlugin = window.Capacitor?.Plugins?.Filesystem;
        if (!fsPlugin || typeof fsPlugin.requestPermissions !== "function") return;
        try {
          const perm = await fsPlugin.requestPermissions();
          logDebug("Filesystem permission", perm || {});
        } catch (e) {
          logDebug("Filesystem permission request failed", { message: e.message });
        }
      }

      /** Ensure nested path exists under Capacitor Directory (e.g. DCIM/photobooth/finals). */
      async function ensureFsPath(fsPlugin, directory, relativeDirPath) {
        const parts = relativeDirPath.split("/").filter(Boolean);
        let acc = "";
        for (const part of parts) {
          acc = acc ? `${acc}/${part}` : part;
          if (typeof fsPlugin.mkdir !== "function") continue;
          try {
            await fsPlugin.mkdir({ path: acc, directory, recursive: true });
          } catch (e) {
            // Android Capacitor often throws "Directory exists" — treat as success.
            const msg = (e && e.message) || String(e);
            if (/exist/i.test(msg) || /already/i.test(msg)) continue;
            throw e;
          }
        }
      }

      /**
       * Save blob on native app under SAVE_PATH (PhotoBooth), or browser download to Downloads/PhotoBooth/…
       * @param {"original"|"final"} category
       */
      async function saveBlobToPhotoBoothFolder(blob, filename, category = "original") {
        const folder = SAVE_PATH;
        const relativeFilePath = `${folder}/${filename}`;
        if (!isCapacitorNative()) {
          triggerDownloadBlob(blob, filename);
          return {
            mode: "download",
            path: `Downloads/${relativeFilePath}`,
            category,
            folder,
            fsDirectory: FS_DIRECTORY,
          };
        }
        const fsPlugin = window.Capacitor?.Plugins?.Filesystem;
        if (!fsPlugin || typeof fsPlugin.writeFile !== "function") {
          triggerDownloadBlob(blob, filename);
          return {
            mode: "download",
            path: `Downloads/${relativeFilePath}`,
            category,
            folder,
            fsDirectory: FS_DIRECTORY,
          };
        }
        try {
          await ensureNativeStoragePermission();
          await ensureFsPath(fsPlugin, FS_DIRECTORY, folder);
          const data = await blobToBase64(blob);
          await fsPlugin.writeFile({
            path: relativeFilePath,
            data,
            directory: FS_DIRECTORY,
            recursive: true,
          });
          return {
            mode: "native",
            path: `${FS_DIRECTORY}/${relativeFilePath}`,
            category,
            folder,
            fsDirectory: FS_DIRECTORY,
          };
        } catch (e) {
          logDebug("Native save failed; falling back to browser download", { message: e.message });
          triggerDownloadBlob(blob, filename);
          return {
            mode: "download",
            path: `Downloads/${relativeFilePath}`,
            category,
            folder,
            fsDirectory: FS_DIRECTORY,
          };
        }
      }

      /** Delete only files directly in dirPath (not subfolders) — matches how we write outputs. */
      async function deleteFlatFilesInFsDir(fsPlugin, directory, dirPath) {
        let deleted = 0;
        try {
          const listing = await fsPlugin.readdir({ path: dirPath, directory });
          const files = listing?.files || [];
          for (const f of files) {
            const name = typeof f === "string" ? f : f?.name;
            const type = typeof f === "object" && f ? f.type : undefined;
            if (!name) continue;
            if (type === "directory") continue;
            await fsPlugin.deleteFile({ path: `${dirPath}/${name}`, directory });
            deleted += 1;
          }
        } catch (_e) {
          /* empty or missing dir */
        }
        return deleted;
      }

      async function cleanupSavedFiles() {
        if (!isCapacitorNative()) {
          setStatus("Cleanup is available on mobile app storage only.", true);
          return;
        }
        const fsPlugin = window.Capacitor?.Plugins?.Filesystem;
        if (!fsPlugin || typeof fsPlugin.readdir !== "function" || typeof fsPlugin.deleteFile !== "function") {
          setStatus("Cleanup not supported in this build.", true);
          return;
        }
        await ensureNativeStoragePermission();
        try {
          const deleted = await deleteFlatFilesInFsDir(fsPlugin, FS_DIRECTORY, SAVE_PATH);
          setStatus(
            `Cleanup complete. Removed ${deleted} file(s) under ${FS_DIRECTORY}/${SAVE_PATH}`
          );
          logDebug("Cleanup complete", {
            deleted,
            fsDirectory: FS_DIRECTORY,
            savePath: SAVE_PATH,
          });
        } catch (e) {
          setStatus(`Cleanup failed: ${e.message}`, true);
          logDebug("Cleanup failed", { message: e.message });
        }
      }

      async function downloadFinalToDevice(finalUrl, filename) {
        const res = await apiFetch(finalUrl, {}, "download-final");
        if (!res.ok) throw new Error(`Final download failed (${res.status}) ${await readErrorBody(res)}`);
        const blob = await res.blob();
        return saveBlobToPhotoBoothFolder(blob, filename, "final");
      }

      function applyCameraModeUI() {
        if (!isMobileDevice()) {
          cameraModeSelect.value = "front";
          cameraModeSelect.disabled = true;
        }
        if (isRearMode()) {
          sizeSelect.value = "4x6";
          orientationSelect.value = "portrait";
          sizeSelect.disabled = true;
          orientationSelect.disabled = true;
          frameGrid.style.display = "none";
          finalFormat.value = "jpeg";
          prepareFinalBtn.style.display = "none";
          finalFormat.style.display = "none";
        } else {
          sizeSelect.disabled = false;
          orientationSelect.disabled = false;
          prepareFinalBtn.style.display = currentImageId ? "" : "none";
          finalFormat.style.display = currentImageId ? "" : "none";
          if (currentImageId) frameGrid.style.display = "grid";
        }
        updatePreviewRatio();
        syncRearPreviewToolbar();
      }

      function fillSelect(selectEl, options, defaultValue = "") {
        selectEl.innerHTML = "";
        for (const val of options) {
          const opt = document.createElement("option");
          opt.value = val;
          opt.textContent = val;
          if (val === defaultValue) opt.selected = true;
          selectEl.appendChild(opt);
        }
      }

      function updatePreviewRatio() {
        const size = sizeSelect.value || "4x6";
        const orientation = orientationSelect.value || "portrait";
        const [a, b] = size.split("x").map((x) => parseInt(x, 10));
        if (!a || !b) return;
        const ratio = orientation === "landscape" ? `${b} / ${a}` : `${a} / ${b}`;
        previewShell.style.setProperty("--preview-ratio", ratio);
      }

      async function startCamera() {
        if (activeStream) {
          setStatus("Camera already on");
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: isRearMode() ? "environment" : "user" },
          audio: false,
        });
        activeStream = stream;
        video.srcObject = stream;
        setCameraButtonsState(true);
        setStatus(DEBUG_MODE ? "Camera ready (ON)" : "Camera on");
      }

      function stopCamera() {
        if (!activeStream) {
          setStatus("Camera already off");
          return;
        }
        for (const track of activeStream.getTracks()) {
          track.stop();
        }
        activeStream = null;
        video.srcObject = null;
        setCameraButtonsState(false);
        setStatus(DEBUG_MODE ? "Camera stopped (OFF)" : "Camera off");
      }

      async function loadOptions() {
        let optionsUrl = `${API_BASE}/options`;
        if (ENABLE_8X11) optionsUrl += `?include_8x11=1`;
        const res = await apiFetch(optionsUrl, {}, "options");
        if (!res.ok) throw new Error(`Options API failed (${res.status}) ${await readErrorBody(res)}`);
        const data = await res.json();
        fillSelect(sizeSelect, data.sizes || ["4x6"], "4x6");
        fillSelect(orientationSelect, data.orientations || ["portrait", "landscape"], "portrait");
      }

      function setSelectedFrameVisual(frameId) {
        selectedFrameId = frameId;
        for (const el of frameGrid.querySelectorAll(".frame-card")) {
          el.classList.toggle("selected", el.dataset.frameId === frameId);
        }
        finalLinkWrap.innerHTML = "";
        currentFinalUrl = "";
      }

      async function composePreviewForFrame(frameId) {
        if (!currentImageId) return;
        if (!frameId) return;
        // If a final was already prepared, the preview selection can still change
        // (multi-print workflow). Any previously prepared final becomes stale.
        finalizedImageId = null;
        currentFinalUrl = "";
        finalLinkWrap.innerHTML = "";
        printBtn.style.display = "none";

        setStatus(`Composing preview (${frameId})...`);
        const payload = {
          image_id: currentImageId,
          frame_id: frameId,
          size: sizeSelect.value || "4x6",
          orientation: orientationSelect.value || "portrait",
        };
        const res = await apiFetch(`${API_BASE}/compose/preview-from-id`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        }, "preview-from-id");
        if (!res.ok) throw new Error(`Preview compose failed (${res.status}) ${await readErrorBody(res)}`);
        const data = await res.json();
        if (data.preview_url) {
          preview.src = `${API_BASE}${data.preview_url}?t=${Date.now()}`;
          setStatus(`Preview ready (${frameId})`);
        }
      }

      async function loadFrames(generatePreviews) {
        const size = sizeSelect.value || "4x6";
        const orientation = orientationSelect.value || "portrait";
        const res = await apiFetch(`${API_BASE}/frames?size=${encodeURIComponent(size)}`, {}, "frames");
        if (!res.ok) throw new Error(`Frame API failed (${res.status}) ${await readErrorBody(res)}`);
        const data = await res.json();
        const frames = data.frames || [];

        frameGrid.innerHTML = "";
        const previousSelection = selectedFrameId || "";
        finalLinkWrap.innerHTML = "";
        currentFinalUrl = "";

        // Choose a default frame preference.
        const defaultFrame = frames.some((f) => f.id === "story-memories")
          ? "story-memories"
          : (frames[0]?.id || "");
        if (!rearFixedFrameId && defaultFrame) rearFixedFrameId = defaultFrame;
        if (frames.some((f) => f.id === "story-memories")) rearFixedFrameId = "story-memories";

        for (const f of frames) {
          const card = document.createElement("div");
          card.className = "frame-card";
          card.dataset.frameId = f.id;

          const thumb = document.createElement("div");
          thumb.className = "frame-thumb";
          const img = document.createElement("img");
          img.alt = `Preview ${f.id}`;
          img.src = `${API_BASE}/frames/template/${encodeURIComponent(size)}/${encodeURIComponent(f.id)}`;
          thumb.appendChild(img);

          const name = document.createElement("div");
          name.className = "frame-name";
          name.textContent = f.id;

          card.appendChild(thumb);
          card.appendChild(name);

          card.addEventListener("click", async () => {
            if (isRearMode()) return;
            setSelectedFrameVisual(f.id);
            try {
              await composePreviewForFrame(f.id);
            } catch (e) {
              setStatus(`Preview error: ${e.message}`, true);
            }
          });

          frameGrid.appendChild(card);
        }

        // Restore previous frame selection if possible.
        const fallbackSelection = (previousSelection && frames.some((f) => f.id === previousSelection))
          ? previousSelection
          : (defaultFrame || frames[0]?.id || "");

        if (fallbackSelection) {
          const lockedSelection = isRearMode()
            ? (frames.some((f) => f.id === "story-memories") ? "story-memories" : (rearFixedFrameId || fallbackSelection))
            : fallbackSelection;
          setSelectedFrameVisual(lockedSelection);
          if (currentImageId) {
            await composePreviewForFrame(lockedSelection);
          } else {
            setStatus(`Choose a frame (capture to preview). Frames: ${frames.length}`);
          }
        } else {
          setStatus(`No frames found for ${size}.`);
        }
      }

      async function captureAndCompose() {
        if (captureWorkflowBusy) return;
        if (!video.videoWidth || !video.videoHeight) {
          setStatus("Camera not ready yet. Please allow camera access.", true);
          return;
        }
        captureWorkflowBusy = true;
        captureBtn.disabled = true;
        rearCaptureAgainBtn.disabled = true;
        try {
          if (isRearMode()) {
            clearRearAutoPrintSchedule();
            if (previewCard.style.display !== "none") {
              rearPreviewToolbar.classList.add("visible");
              rearPrintCountdown.classList.add("idle");
              rearPrintCountdown.textContent = "Capturing…";
            }
          }
          await runCaptureAndComposeCore();
        } finally {
          captureWorkflowBusy = false;
          captureBtn.disabled = false;
          rearCaptureAgainBtn.disabled = false;
          syncRearPreviewToolbar();
        }
      }

      async function runCaptureAndComposeCore() {
        const size = sizeSelect.value || "4x6";
        const orientation = orientationSelect.value || "portrait";

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.95));
        currentCaptureBlob = blob;
        const captureTs = getSessionTimestamp();
        currentCaptureMeta = {
          baseName: sanitizeName(nameInput.value),
          captureTs,
          size,
          orientation,
          camera: isRearMode() ? "rear" : "front",
          frameId: "no-frame",
        };

        const form = new FormData();
        form.append("image", blob, "capture.jpg");
        // Create an empty/no-frame preview to store the image_id.
        form.append("frame_id", "");
        form.append("size", size);
        form.append("orientation", orientation);
        form.append("display_name", (nameInput.value || "").trim());
        form.append("capture_ts", captureTs);

        const res = await apiFetch(`${API_BASE}/compose/preview`, { method: "POST", body: form }, "compose-preview");
        if (!res.ok) throw new Error(`Capture failed (${res.status}) ${await readErrorBody(res)}`);
        const data = await res.json();

        currentImageId = data.image_id;
        finalizedImageId = null;
        currentFinalUrl = "";
        finalLinkWrap.innerHTML = "";
        preview.src = "";
        selectedFrameId = "";
        framePreviewUrls = {};

        setStatus(DEBUG_MODE ? "Image captured. Preparing frame options…" : "Working…");
        await loadFrames(false);

        const originalFilename = `${buildFilePrefix(currentCaptureMeta)}_original.jpg`;
        const originalSave = await saveBlobToPhotoBoothFolder(blob, originalFilename);
        logDebug("Original image saved", { filename: originalFilename, ...originalSave });
        setStatus(DEBUG_MODE ? `Image captured and saved: ${originalFilename}` : "Photo saved.");

        previewCard.style.display = "block";
        printBtn.style.display = "";

        if (isRearMode()) {
          finalFormat.value = "jpeg";
          prepareFinalBtn.style.display = "none";
          finalFormat.style.display = "none";
          frameGrid.style.display = "none";
          rearPreparingFinal = true;
          syncRearPreviewToolbar();
          try {
            await prepareFinal();
            scheduleRearAutoPrint();
          } catch (e) {
            setStatus(`Rear auto-final failed: ${e.message}`, true);
            logDebug("Rear auto-final error", { message: e.message });
          } finally {
            rearPreparingFinal = false;
            syncRearPreviewToolbar();
          }
        } else {
          frameGrid.style.display = "grid";
          prepareFinalBtn.style.display = "";
          finalFormat.style.display = "";
        }
      }

      async function prepareFinal() {
        if (!currentImageId) {
          setStatus("Capture an image first.", true);
          return;
        }
        if (!selectedFrameId) {
          setStatus("Select a frame option first.", true);
          return;
        }

        const payload = {
          image_id: currentImageId,
          frame_id: selectedFrameId,
          size: sizeSelect.value || "4x6",
          orientation: orientationSelect.value || "portrait",
          output_format: finalFormat.value,
        };
        const res = await apiFetch(`${API_BASE}/compose/final`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        }, "compose-final");
        if (!res.ok) throw new Error(`Final output failed (${res.status}) ${await readErrorBody(res)}`);
        const data = await res.json();

        const href = `${API_BASE}${data.final_url}?t=${Date.now()}`;
        currentFinalUrl = href;
        finalizedImageId = currentImageId;
        if (isRearMode() && !DEBUG_MODE) {
          finalLinkWrap.innerHTML = "";
        } else {
          finalLinkWrap.innerHTML = `Final ready: <a href="${href}" target="_blank" rel="noopener">Open ${data.output_format.toUpperCase()}</a>`;
        }
        const meta = currentCaptureMeta || {
          baseName: sanitizeName(nameInput.value),
          captureTs: getSessionTimestamp(),
          size: sizeSelect.value || "4x6",
          orientation: orientationSelect.value || "portrait",
          camera: isRearMode() ? "rear" : "front",
          frameId: selectedFrameId || "no-frame",
        };
        meta.frameId = selectedFrameId || meta.frameId || "no-frame";
        currentCaptureMeta = meta;
        const ext = data.output_format === "jpeg" ? "jpg" : data.output_format;
        const finalFilename = `${buildFilePrefix(meta)}_final.${ext}`;
        const finalSave = await downloadFinalToDevice(href, finalFilename);
        logDebug("Final file saved", { filename: finalFilename, format: data.output_format, ...finalSave });
        setStatus(
          DEBUG_MODE
            ? `Final ${data.output_format.toUpperCase()} prepared and saved: ${finalFilename}`
            : "Final ready."
        );

        // Ensure print is available for this freshly prepared final.
        printBtn.style.display = "";
      }

      captureBtn.addEventListener("click", async () => {
        try {
          await captureAndCompose();
        } catch (e) {
          setStatus(`Capture error: ${e.message}`, true);
        }
      });

      startCameraBtn.addEventListener("click", async () => {
        try {
          await startCamera();
        } catch (e) {
          setStatus(`Camera init failed: ${e.message}`, true);
        }
      });

      stopCameraBtn.addEventListener("click", () => {
        stopCamera();
      });

      prepareFinalBtn.addEventListener("click", async () => {
        try {
          await prepareFinal();
        } catch (e) {
          setStatus(`Finalization error: ${e.message}`, true);
        }
      });

      printBtn.addEventListener("click", () => {
        if (!currentFinalUrl) {
          setStatus("Prepare a final file first.", true);
          return;
        }
        clearRearAutoPrintSchedule();
        syncRearPreviewToolbar();
        window.open(currentFinalUrl, "_blank", "noopener");
        setStatus(DEBUG_MODE ? "Opened final file. Use the print dialog." : "Print dialog opened.");
      });

      rearCaptureAgainBtn.addEventListener("click", async () => {
        try {
          await captureAndCompose();
        } catch (e) {
          setStatus(`Capture error: ${e.message}`, true);
        }
      });

      cleanupBtn.addEventListener("click", async () => {
        await cleanupSavedFiles();
      });

      sizeSelect.addEventListener("change", async () => {
        if (isRearMode()) {
          sizeSelect.value = "4x6";
          return;
        }
        updatePreviewRatio();
        try {
          await loadFrames(false);
        } catch (e) {
          setStatus(`Frames unavailable: ${e.message}`, true);
        }
      });

      orientationSelect.addEventListener("change", async () => {
        if (isRearMode()) {
          orientationSelect.value = "portrait";
          return;
        }
        updatePreviewRatio();
        try {
          await loadFrames(false);
        } catch (e) {
          setStatus(`Preview error: ${e.message}`, true);
        }
      });

      cameraModeSelect.addEventListener("change", async () => {
        clearRearAutoPrintSchedule();
        const wasOn = !!activeStream;
        if (wasOn) stopCamera();
        applyCameraModeUI();
        syncRearPreviewToolbar();
        try {
          await loadFrames(false);
          if (wasOn) await startCamera();
          setStatus(
            isRearMode()
              ? DEBUG_MODE
                ? "Rear camera: fixed 4×6 + frame."
                : "Rear camera"
              : DEBUG_MODE
                ? "Front camera: full options."
                : "Front camera"
          );
        } catch (e) {
          setStatus(`Mode switch failed: ${e.message}`, true);
        }
      });

      (async function init() {
        applyProductionChrome();
        setCameraButtonsState(false);
        await ensureNativeStoragePermission();
        const serverOk = await checkApiHealth();
        if (!serverOk) {
          setStatus(
            DEBUG_MODE
              ? "Cannot reach API. Start standalone (:8001) or Docker (:8000) on this machine."
              : "Can’t connect to the photo booth. Start the server on this computer, then refresh.",
            true
          );
        } else {
          setStatus(DEBUG_MODE ? "Camera is off — click Start Camera." : "Tap Start camera when you’re ready.");
        }
        logDebug("App init", {
          apiBase: API_BASE,
          enable8x11: ENABLE_8X11,
          rearAutoPrintDelayMs: REAR_AUTO_PRINT_DELAY_MS,
          suppressRearBrowserPrint: SUPPRESS_REAR_BROWSER_PRINT,
          online: navigator.onLine,
          fsDirectory: FS_DIRECTORY,
          saveParent: savePathParent || "(none — dated folder only)",
          eventFolder: EVENT_FOLDER_NAME,
          fullSavePath: SAVE_PATH,
          syncthingHint:
            FS_DIRECTORY === "EXTERNAL_STORAGE"
              ? `Phone: /storage/emulated/0/${SAVE_PATH}/`
              : "Set EXTERNAL_STORAGE + Download for a public save folder.",
        });
        try {
          if (serverOk) {
            await loadOptions();
            applyCameraModeUI();
            updatePreviewRatio();
            await loadFrames(false);
            syncRearPreviewToolbar();
          }
        } catch (e) {
          setStatus(
            DEBUG_MODE ? `Frames unavailable: ${e.message}` : "Could not load frames. Check the server and try again.",
            true
          );
        }
      })();

      window.addEventListener("beforeunload", () => {
        if (activeStream) stopCamera();
      });
    </script>
  </body>
  </html>
