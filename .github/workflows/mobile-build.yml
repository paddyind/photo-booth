name: Mobile Build (APK + IPA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_apk:
        description: "Build Android APK (debug)"
        required: false
        default: true
        type: boolean
      build_ipa:
        description: "Build iOS IPA (requires signing secrets). If secrets are missing, job will fail with a clear message."
        required: false
        default: false
        type: boolean
      build_ios_simulator_app:
        description: "Also build iOS Simulator .app artifact (does not require signing)."
        required: false
        default: true
        type: boolean
      api_base_url:
        description: "API base URL injected into the mobile build (used by the web bundle / Capacitor if configured)."
        required: false
        default: "http://YOUR_LAN_IP:8000"
        type: string
      enable_8x11:
        description: "Opt-in to showing 8x11 (A4-style) in the mobile UI."
        required: false
        default: false
        type: boolean

jobs:
  validate-web-bundle:
    name: Validate web bundle (prepare-www)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Prepare mobile www
        env:
          PHOTOBOOTH_API_BASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url
                || vars.PHOTOBOOTH_API_BASE
                || 'http://YOUR_LAN_IP:8000' }}
          PHOTOBOOTH_ENABLE_8X11: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.enable_8x11
                || vars.PHOTOBOOTH_ENABLE_8X11
                || false }}
        run: |
          cd apps/mobile
          npm run prepare-www
          test -f "www/index.html" || { echo "Missing apps/mobile/www/index.html"; exit 1; }

  android-apk:
    name: Android APK
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_apk }}
    needs: validate-web-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify mobile app scaffold exists
        run: |
          test -f "apps/mobile/package.json" || { echo "apps/mobile/package.json not found. Create a Capacitor mobile app in apps/mobile first."; exit 1; }

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Set up JDK 17 (Android-compatible)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;35.0.0"

      - name: Ensure @capacitor/android is installed
        run: |
          cd apps/mobile
          npm install @capacitor/android@5.6.0 --no-save

      - name: Start backend/web (CI Docker warm-up)
        run: |
          echo "Skipping backend/web Docker warm-up in mobile CI (packaging doesn't require live API)."

      - name: Capacitor sync
        run: |
          cd apps/mobile
          PHOTOBOOTH_API_BASE="${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || vars.PHOTOBOOTH_API_BASE || 'http://YOUR_LAN_IP:8000' }}" \
          PHOTOBOOTH_ENABLE_8X11="${{ github.event_name == 'workflow_dispatch' && inputs.enable_8x11 || vars.PHOTOBOOTH_ENABLE_8X11 || false }}" \
          npm run prepare-www
          # Create native Android project files if missing.
          npx cap add android
          npx cap sync android
          echo "Android generated files:"
          ls -la apps/mobile/android
          test -f apps/mobile/android/settings.gradle || { echo "ERROR: apps/mobile/android/settings.gradle missing after cap sync"; exit 1; }

      - name: Build Android APK
        run: |
          cd apps/mobile/android
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.run_number }}
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk

  ios-simulator:
    name: iOS Simulator (.app)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios_simulator_app }}
    needs: validate-web-bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            echo "CocoaPods not found; installing..."
            sudo gem install cocoapods --no-document
          else
            echo "CocoaPods already installed"
          fi

      - name: Verify mobile app scaffold exists
        run: |
          test -f "apps/mobile/package.json" || { echo "apps/mobile/package.json not found. Create a Capacitor mobile app in apps/mobile first."; exit 1; }

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Ensure @capacitor/ios is installed
        run: |
          cd apps/mobile
          npm install @capacitor/ios@5.6.0 --no-save

      - name: Start backend/web (CI Docker warm-up)
        run: |
          echo "Skipping backend/web Docker warm-up in mobile CI (packaging doesn't require live API)."

      - name: Capacitor sync
        run: |
          cd apps/mobile
          PHOTOBOOTH_API_BASE="${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || vars.PHOTOBOOTH_API_BASE || 'http://YOUR_LAN_IP:8000' }}" \
          PHOTOBOOTH_ENABLE_8X11="${{ github.event_name == 'workflow_dispatch' && inputs.enable_8x11 || vars.PHOTOBOOTH_ENABLE_8X11 || false }}" \
          npm run prepare-www
          # Create native iOS project files if missing.
          npx cap add ios
          npx cap sync ios

      - name: Build iOS Simulator app
        run: |
          cd apps/mobile/ios
          # Common Capacitor default: App target name is "App"
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS Simulator .app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app-${{ github.run_number }}
          path: apps/mobile/ios/App/build/Build/Products/Debug-iphonesimulator/*.app

  ios-ipa:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ipa }}
    needs: validate-web-bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            echo "CocoaPods not found; installing..."
            sudo gem install cocoapods --no-document
          else
            echo "CocoaPods already installed"
          fi

      - name: Verify mobile app scaffold exists
        run: |
          test -f "apps/mobile/package.json" || { echo "apps/mobile/package.json not found. Create a Capacitor mobile app in apps/mobile first."; exit 1; }

      - name: Verify iOS signing secrets
        run: |
          if [ -z "${IOS_CERT_P12_BASE64}" ] || [ -z "${IOS_PROVISIONING_PROFILE_BASE64}" ] || [ -z "${IOS_BUNDLE_ID}" ]; then
            echo "Missing signing secrets. Required: IOS_CERT_P12_BASE64, IOS_PROVISIONING_PROFILE_BASE64, IOS_BUNDLE_ID"
            exit 1
          fi

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Ensure @capacitor/ios is installed
        run: |
          cd apps/mobile
          npm install @capacitor/ios@5.6.0 --no-save

      - name: Start backend/web (CI Docker warm-up)
        run: |
          echo "Skipping backend/web Docker warm-up in mobile CI (packaging doesn't require live API)."

      - name: Capacitor sync
        run: |
          cd apps/mobile
          PHOTOBOOTH_API_BASE="${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || vars.PHOTOBOOTH_API_BASE || 'http://YOUR_LAN_IP:8000' }}" \
          PHOTOBOOTH_ENABLE_8X11="${{ github.event_name == 'workflow_dispatch' && inputs.enable_8x11 || vars.PHOTOBOOTH_ENABLE_8X11 || false }}" \
          npm run prepare-www
          npx cap add ios
          npx cap sync ios

      - name: Decode signing artifacts
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          set -e
          mkdir -p ~/ios-signing
          echo "$IOS_CERT_P12_BASE64" | base64 --decode > ~/ios-signing/cert.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/ios-signing/profile.mobileprovision

      - name: Build signed IPA
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          set -euo pipefail

          # Expected defaults (adjust these if your iOS project uses different names).
          IOS_DIR="apps/mobile/ios"
          XCODE_PROJECT="$IOS_DIR/App.xcodeproj"
          SCHEME="App"

          test -f "$XCODE_PROJECT" || { echo "Expected iOS project not found: $XCODE_PROJECT"; exit 1; }
          test -d "$IOS_DIR" || { echo "Expected iOS directory not found: $IOS_DIR"; exit 1; }

          CERT_P12="$HOME/ios-signing/cert.p12"
          PROFILE_MOBILEPROVISION="$HOME/ios-signing/profile.mobileprovision"

          if [ ! -f "$CERT_P12" ] || [ ! -f "$PROFILE_MOBILEPROVISION" ]; then
            echo "Signing files missing in ~/ios-signing/. Check the 'Decode signing artifacts' step."
            exit 1
          fi

          # Install provisioning profile
          PROFILE_NAME="$(/usr/bin/python3 - <<'PY'\nimport plistlib, subprocess\nfrom pathlib import Path\np=Path.home()/'ios-signing'/'profile.mobileprovision'\ndata=subprocess.check_output(['security','cms','-D','-i',str(p)])\nplist=plistlib.loads(data)\nprint(plist.get('Name',''))\nPY\n)"
          if [ -z "$PROFILE_NAME" ]; then
            echo "Could not determine provisioning profile Name from mobileprovision."
            exit 1
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\\ Profiles
          cp "$PROFILE_MOBILEPROVISION" ~/Library/MobileDevice/Provisioning\\ Profiles/

          # Create keychain and import certificate
          KEYCHAIN=build.keychain-db
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"

          CERT_PASS="${IOS_CERT_P12_PASSWORD:-}"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$CERT_PASS" -T /usr/bin/codesign || true

          # Archive
          rm -rf "$IOS_DIR/build"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$IOS_DIR/build/$SCHEME.xcarchive" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${IOS_TEAM_ID:-}" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

          # Export
          EXPORT_DIR="$IOS_DIR/build/export"
          mkdir -p "$EXPORT_DIR"
          IOS_EXPORT_METHOD="${IOS_EXPORT_METHOD:-ad-hoc}"

          cat > "$IOS_DIR/build/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$IOS_EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "$IOS_DIR/build/$SCHEME.xcarchive" \
            -exportOptionsPlist "$IOS_DIR/build/exportOptions.plist" \
            -exportPath "$EXPORT_DIR"

          ls -la "$EXPORT_DIR"

      - name: Upload IPA artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: apps/mobile/ios/build/export/*.ipa

