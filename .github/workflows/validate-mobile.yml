name: Validate and build mobile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;35.0.0"

      - name: Verify mobile app scaffold exists
        run: |
          test -f "apps/mobile/package.json" || { echo "apps/mobile/package.json not found. Create a Capacitor app first."; exit 1; }

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Capacitor sync (Android)
        env:
          PHOTOBOOTH_API_BASE: "http://127.0.0.1:8000"
          PHOTOBOOTH_ENABLE_8X11: "false"
        run: |
          cd apps/mobile
          npm run prepare-www
          # Always ensure the native platform exists in CI workspace.
          npx cap add android
          npx cap sync android

  ios-validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            echo "CocoaPods not found; installing..."
            sudo gem install cocoapods --no-document
          else
            echo "CocoaPods already installed"
          fi

      - name: Verify mobile app scaffold exists
        run: |
          test -f "apps/mobile/package.json" || { echo "apps/mobile/package.json not found. Create a Capacitor app first."; exit 1; }

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci || npm install --legacy-peer-deps

      - name: Capacitor sync (iOS)
        env:
          PHOTOBOOTH_API_BASE: "http://127.0.0.1:8000"
          PHOTOBOOTH_ENABLE_8X11: "false"
        run: |
          cd apps/mobile
          npm run prepare-www
          # Always ensure the native platform exists in CI workspace.
          npx cap add ios
          npx cap sync ios

